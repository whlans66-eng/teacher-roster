<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>船帳系統 — 互動序列圖</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', monospace;
  background: #0f172a;
  color: #e2e8f0;
  padding: 32px 24px;
}
h1 { text-align:center; font-size:20px; font-weight:700; letter-spacing:2px; color:#f1f5f9; margin-bottom:4px; }
.subtitle { text-align:center; font-size:12px; color:#475569; letter-spacing:1px; margin-bottom:32px; }

/* tab switcher */
.tabs {
  display: flex; gap: 8px; justify-content: center;
  margin-bottom: 28px; flex-wrap: wrap;
}
.tab-btn {
  padding: 7px 18px; border-radius: 20px; font-size: 12px;
  cursor: pointer; border: 1px solid #334155; background: #1e293b;
  color: #64748b; transition: all .2s; letter-spacing: 1px;
}
.tab-btn:hover { border-color: #475569; color: #94a3b8; }
.tab-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; font-weight: 700; }

.diagram { display: none; max-width: 1100px; margin: 0 auto; }
.diagram.active { display: block; }

/* ── SEQUENCE DIAGRAM ── */
.seq {
  position: relative;
}

/* header row */
.seq-header {
  display: grid;
  margin-bottom: 0;
}
.actor-box {
  text-align: center;
  padding: 12px 8px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  border: 2px solid;
  position: relative;
  z-index: 2;
}
.actor-box.crew   { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
.actor-box.master { background: #1a3a2a; border-color: #22c55e; color: #86efac; }
.actor-box.system { background: #2d1f3d; border-color: #a855f7; color: #d8b4fe; }
.actor-box.shore  { background: #3a2010; border-color: #f97316; color: #fdba74; }
.actor-box.fms    { background: #1e2433; border-color: #475569; color: #94a3b8; }

/* lifeline area */
.seq-body {
  position: relative;
  padding: 0;
}

/* vertical lifelines */
.lifelines {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
}

/* each row is a step */
.seq-row {
  display: grid;
  align-items: center;
  min-height: 48px;
  position: relative;
  z-index: 1;
}
.seq-row.gap { min-height: 16px; }
.seq-row.section-break {
  min-height: 36px;
  align-items: center;
}
.section-label {
  font-size: 10px; letter-spacing: 2px; color: #334155;
  text-align: center; grid-column: 1 / -1;
  border-top: 1px dashed #1e293b;
  padding-top: 10px; margin-top: 4px;
}

/* cell in a row */
.cell {
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px; min-height: 48px; position: relative;
}
.cell.lifeline::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: 50%; width: 2px;
  background: repeating-linear-gradient(to bottom, #1e293b 0px, #1e293b 6px, transparent 6px, transparent 12px);
  z-index: -1;
}
.cell.lifeline-solid::after {
  background: #1e293b;
}

/* activation box on lifeline */
.activation {
  position: absolute;
  left: calc(50% - 8px); width: 16px;
  top: 0; bottom: 0;
  border-radius: 3px;
  z-index: 1;
}
.activation.crew   { background: rgba(59,130,246,0.25); border: 1px solid #3b82f6; }
.activation.master { background: rgba(34,197,94,0.25); border: 1px solid #22c55e; }
.activation.system { background: rgba(168,85,247,0.25); border: 1px solid #a855f7; }
.activation.shore  { background: rgba(249,115,22,0.25); border: 1px solid #f97316; }

/* message arrow cell — spans from col A to col B */
.msg-cell {
  display: flex; align-items: center;
  padding: 0 8px; position: relative; z-index: 2;
}
.msg-arrow {
  display: flex; align-items: center; width: 100%; gap: 0;
  position: relative;
}
.msg-line {
  flex: 1; height: 2px;
  position: relative;
}
.msg-line.solid { background: currentColor; }
.msg-line.dashed {
  background: repeating-linear-gradient(to right, currentColor 0, currentColor 6px, transparent 6px, transparent 12px);
}
.msg-head {
  font-size: 14px; line-height: 1; flex-shrink: 0;
}
.msg-label {
  position: absolute; top: -20px; left: 50%;
  transform: translateX(-50%);
  font-size: 11px; white-space: nowrap;
  background: #0f172a;
  padding: 1px 6px; border-radius: 4px;
  border: 1px solid #1e293b;
  z-index: 3;
}
/* self-message */
.self-msg {
  font-size: 11px; padding: 5px 10px;
  border-radius: 6px; border: 1px solid;
  max-width: 160px; line-height: 1.4;
  background: #0f172a;
}
.self-msg.crew   { border-color: #1d4ed8; color: #93c5fd; }
.self-msg.master { border-color: #15803d; color: #86efac; }
.self-msg.system { border-color: #7c3aed; color: #d8b4fe; }
.self-msg.shore  { border-color: #c2410c; color: #fdba74; }

/* note box */
.note-box {
  font-size: 10px; padding: 5px 8px;
  border-radius: 4px; border: 1px solid #334155;
  background: #1e293b; color: #94a3b8;
  max-width: 140px; line-height: 1.4;
  position: absolute; right: 8px; top: 50%;
  transform: translateY(-50%);
}

/* condition / alt box */
.alt-box {
  grid-column: 1 / -1;
  border: 1px solid #334155; border-radius: 6px;
  margin: 4px 8px; padding: 6px 10px;
  font-size: 10px; color: #475569;
  position: relative;
}
.alt-box .alt-label {
  position: absolute; top: -1px; left: 8px;
  background: #1e293b; padding: 0 4px;
  font-size: 9px; letter-spacing: 1px; color: #64748b;
  border-radius: 3px;
}
.alt-inner { padding-top: 8px; }

/* status chips */
.chip {
  display: inline-block; font-size: 9px; padding: 1px 6px;
  border-radius: 8px; font-weight: 600; margin-left: 4px;
}
.chip.auto   { background: #14532d; color: #86efac; }
.chip.block  { background: #7f1d1d; color: #fca5a5; }
.chip.manual { background: #78350f; color: #fde68a; }
.chip.ai     { background: #4c1d95; color: #ddd6fe; }
</style>
</head>
